name: Validate and organize repo, build and publish Docker images

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch: {}

jobs:
  validate-and-organize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true # allow the runner to use the GITHUB_TOKEN for git operations
          fetch-depth: 0 # otherwise, there would be errors pushing refs to the destination repository.

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Pip install packages
        run: |
          python -m pip install -U pip
          pip install --no-cache-dir domino-py[cli]

      - name: Auto-bump patch version
        if: "!contains(github.event.head_commit.message, 'auto-organize')"
        run: |
          python - <<'EOF'
          import re, pathlib
          text = pathlib.Path("config.toml").read_text()
          match = re.search(r'VERSION = "(\d+)\.(\d+)\.(\d+)"', text)
          major, minor, patch = match.groups()
          new_version = f'{major}.{minor}.{int(patch)+1}'
          new_text = re.sub(r'VERSION = "\d+\.\d+\.\d+"', f'VERSION = "{new_version}"', text)
          pathlib.Path("config.toml").write_text(new_text)
          print(f"Bumped version to {new_version}")
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pip list
        run: pip list | grep domino

      - name: Run organize and build images
        run: |
          domino piece organize --build-images --source-url=https://github.com/${{github.repository}}

      - name: Install Tests Dependencies
        run: pip install -r requirements-tests.txt

      - name: Run tests over built images
        env:
          DOMINO_TESTS_ENVIRONMENT: github
        run: |
          export PYTHONPATH=Own_Pieces:$PYTHONPATH
          pytest --cov=pieces --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish images
        run: |
          VERSION=$(python3 -c "import re,pathlib; m=re.search(r'VERSION = \"([\d.]+)\"', pathlib.Path('config.toml').read_text()); print(m.group(1))")
          for group in group0 group1; do
            image="ghcr.io/${{ github.repository_owner }}/borzikpieces:${VERSION}-${group}"
            echo "Pushing $image ..."
            for attempt in 1 2 3; do
              docker push "$image" && break
              echo "Attempt $attempt failed, retrying in 15s..."
              sleep 15
            done
          done

      - name: Commit files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          GIT_STATUS=$(git status -s)
          [[ ! -z "$GIT_STATUS" ]] && git add .domino/* config.toml && git commit -m "auto-organize" -a || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Create Release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: domino piece release
